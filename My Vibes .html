<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyVibe — Découvre ce qui te correspond</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>MyVibe ✨</h1>
    <p>Dis-moi ce que tu aimes, je te recommande ce qui te correspond</p>
  </header>

  <!-- ZONE INPUT -->
  <main>
    <section class="input-zone">
      <div class="input-wrapper">
        <input 
          type="text" 
          id="userInput" 
          placeholder="Ex: jazz, science-fiction, natation…"
          autocomplete="off"
        >
        <button class="btn-primary" id="discoverBtn">Découvrir 🔍</button>
      </div>
      <div id="tagSuggestions"></div>
      <div style="text-align:center">
        <button class="btn-secondary" id="resetBtn">🔄 Recommencer</button>
      </div>
    </section>

    <!-- LOADER -->
    <div id="loader" style="display:none">
      <div class="loader">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <!-- RÉSULTATS -->
    <section id="resultsSection" style="display:none">
      <div id="detectedTagsWrapper"></div>
      <p id="resultsMood" style="text-align:center; color:var(--text-secondary); margin-bottom:24px;"></p>
      <div id="cardsGrid" class="cards-grid"></div>
    </section>
  </main>

  <!-- MODAL -->
  <div id="modalOverlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <button id="modalClose" style="
        position:absolute; top:16px; right:16px;
        background:transparent; border:none;
        color:var(--text-secondary); font-size:1.5rem;
        cursor:pointer;">✕</button>
      <h2 id="modalTitle" style="font-family:var(--font-display); margin-bottom:16px;"></h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="Database.js"></script>
  <script src="Engine.js"></script>
  <script src="UI.js"></script>
  <script src="App.js"></script>

</body>
</html>
